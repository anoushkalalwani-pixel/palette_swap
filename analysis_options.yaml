# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The analyzer can be invoked from the command line by running `flutter analyze`.

# Activates the set of recommended lints for Flutter apps.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat analysis as strictly as possible so type-safety issues surface early.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Promote a handful of high-signal lints from warnings to hard errors.
    missing_required_param: error
    missing_return: error
    todo: ignore

linter:
  rules:
    # Enforced beyond the flutter_lints baseline to keep the codebase tidy.
    - always_declare_return_types
    - prefer_single_quotes
    - require_trailing_commas
    - unawaited_futures
    - directives_ordering
